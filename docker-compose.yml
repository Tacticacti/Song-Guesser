services:
  db:
    image: postgres:17-alpine
    container_name: song-guesser-db
    environment:
      POSTGRES_USER: songguesser
      POSTGRES_PASSWORD: songguesser
      POSTGRES_DB: songguesser
    ports:
      - "5432:5432"
    volumes:
      - leaderboard-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U songguesser"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  leaderboard-data:
