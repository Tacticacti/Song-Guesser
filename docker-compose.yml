services:
  db:
    build:
      context: .
      dockerfile: db.Dockerfile
    container_name: song-guesser-db
    # run as the postgres user from the start; the image's usual root-then-
    # step-down dance (via gosu) is not needed and gosu has been removed
    user: postgres
    environment:
      POSTGRES_USER: songguesser
      POSTGRES_PASSWORD: songguesser
      POSTGRES_DB: songguesser
    ports:
      - "5432:5432"
    volumes:
      - leaderboard-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U songguesser"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  leaderboard-data:
